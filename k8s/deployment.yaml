apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-shifts
  namespace: colossus-volunteer-shifts
  labels:
    app: volunteer-shifts
    managed-by: colossus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: volunteer-shifts
  template:
    metadata:
      labels:
        app: volunteer-shifts
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/volunteer-shifts:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
