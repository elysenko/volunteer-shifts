apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: volunteer-shifts
  namespace: colossus-volunteer-shifts
  labels:
    app: volunteer-shifts
    managed-by: colossus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: ubuntu.desmana-truck.ts.net
      http:
        paths:
          - path: /volunteer-shifts(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: volunteer-shifts
                port:
                  number: 80
  tls:
    - hosts:
        - ubuntu.desmana-truck.ts.net
      secretName: colossus-shared-tls
