server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: react-router BrowserRouter deep links must serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API: backend Service is named `backend` on :3000 (deploy contract)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
